    bottomImage:
      enable: true
    button:
      enable: true
      name: "Resume"
      url: "Devin_von_Gunten_Resume_260302.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/devinvongunten/
        - icon: fab fa-github
          url: https://github.com/Dgunten

  # About
  about:
    enable: true
    title: "About Me"
    image: "/hikephoto.jpg"
    content: |-
      I am a Product Marketing Manager at TMX Datalinx — the data arm of the Toronto & Montreal stock exchanges — where I own positioning, go-to-market strategy, and sales enablement for institutional market data and analytics products serving hedge funds, asset managers, exchanges, and trading platforms.

      With 8+ years of experience spanning capital markets and market data, I specialize in translating complex APIs and proprietary datasets into differentiated narratives that drive enterprise pipeline and contract wins. I bring deep expertise in market structure and institutional trading workflows, combined with technical fluency in SQL, Python, and AI-enabled systems.

    skills:
      enable: true
      title: "Technologies and platforms I work with:"
      items:
        - "SQL"
        - "Python"
        - "GA4"
        - "Looker Studio"
        - "Tableau"
        - "Salesforce"
        - "Pardot (Marketing Cloud)"
        - "Ahrefs"
        - "WordPress"
        - "Adobe Creative Suite"
        - "Advanced Excel"

  # Experience
  experience:
    enable: true
    items:
      - job: "Product Marketing Manager"
        company: "TMX Group"
        companyUrl: "https://www.tmx.com"
        date: "Nov 2022 - present"
        info:
          enable: true
          content: Wall Street Horizon was acquired by TMX Group in November of 2022.
        content: |
          PMM lead for TMX Datalinx and subsidiary brand Wall Street Horizon, owning positioning, go-to-market strategy, and sales enablement across institutional market data and analytics products.

          - Led end-to-end go-to-market strategy for new data product launches, aligning Product, Sales, and Research; influenced creation of 20+ qualified enterprise sales opportunities within the first quarter post-launch
          - Repositioned a core data product from feature-driven messaging to outcome-based value narratives centered on implementation speed, workflow integration, and platform stickiness, directly supporting multiple high-value enterprise contract wins
          - Architected a dual-layer messaging framework, including an AI-optimized technical metadata layer, reducing sales support tickets and accelerating sales rep onboarding
          - Collaborated with the Head of Research to extract and analyze proprietary datasets using SQL; co-developed 80+ institutional research reports used in client acquisition, upsell conversations, and market education
          - Contributed to 46 earned live media appearances in 2025, reinforcing TMX Datalinx's authority in earnings and corporate actions intelligence
          - Led strategic redesign of the product suite experience, driving a 180% YoY increase in inbound leads
          - Plan and host quarterly virtual industry panels focused on earnings season and market structure trends, generating 150+ qualified leads per event

      - job: "Digital Marketing Specialist"
        company: "Wall Street Horizon"
        companyUrl: "https://www.wallstreethorizon.com"
        date: "Jan 2019 - Nov 2022"
        info:
          enable: true
          content: Wall Street Horizon was acquired by TMX Group in November of 2022.
        content: |
          Early marketing hire responsible for building the digital and demand foundation that supported acquisition by TMX Group.

          - Collaborated closely with Sales to refine ICP targeting and messaging based on deal-level feedback, laying the groundwork for formal PMM ownership
          - Designed and implemented lead scoring and nurture programs in Pardot and Salesforce, increasing quarterly qualified sales opportunities by 25%
          - Launched and scaled the company's first research-led content and SEO strategy, driving sustained 200–300% YoY organic growth and increasing institutional market penetration
          - Built the digital marketing engine across paid search, paid social, email, and automation to support pipeline growth and brand credibility

      - job: "Senior Social Media Specialist"
        company: "Exclusive Concepts"
        companyUrl: "https://www.exclusiveconcepts.com"
        date: "May 2017 - Dec 2018"
        info:
          enable: false
        content: |
          One of the first members of the Social Media Marketing team at a leading digital marketing agency, helping grow the program from the ground up.

          - Managed $1M+ in aggregate annual ad spend for 20+ firms across diverse industries, achieving an average 20% increase in target ROI
          - Developed data-driven audience targeting strategies that improved click-through rates by 40% on average
          - Designed and facilitated internal training modules that reduced new-hire onboarding time by 30%

      - job: "Social Media Specialist"
        company: "EVR Advertising"
        companyUrl: "https://www.evradvertising.com"
        date: "Dec 2016 - May 2017"
        content: |
          Created strategic digital marketing plans for clients, analyzed social trends to identify best items to discuss that would gather the most attention, and developed monthly content calendars across all accounts.

