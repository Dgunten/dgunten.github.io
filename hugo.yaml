      - title: TMX Group | Drove 180% increase in inbound web leads YoY
        content: Led strategic redesign of the product suite experience, aligning messaging and buyer journeys to high-intent institutional and fintech segments. Implemented a cohesive layout strategy that streamlined navigation and prominently featured key product value propositions.
      - title: TMX Group | Generated 150+ qualified leads per event through quarterly virtual industry panels
        content: Planned and hosted quarterly virtual panels focused on earnings season and market structure trends, strategically featuring industry experts and highlighting the relevance of TMX Datalinx's data offerings. Led end-to-end event marketing strategy from concept development through lead generation and follow-up.
      - title: TMX Group | Architected dual-layer messaging framework with AI-optimized metadata layer
        content: Designed a structured messaging framework that separated buyer-facing value narratives from AI-optimized technical metadata, reducing sales support tickets and accelerating onboarding for new sales reps.
