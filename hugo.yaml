params:
  title: "Devin von Gunten"
  description: Text about my cool site
  favicon: "/dlogosquare.png"

  useBootstrapCDN: false

  mathjax: false

  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  navbar:
    align: ms-auto
    brandName: "Devin von Gunten"
    disableSearch: true
    stickyNavBar:
      enable : true
      showOnScrollUp : false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Devin."
    subtitle: "Product Marketing Manager | Capital Markets & Market Data"
    content: "I translate complex financial data products into differentiated narratives that drive enterprise pipeline. With 8+ years of experience in capital markets, I specialize in go-to-market strategy, positioning, and sales enablement for institutional investors and traders."
